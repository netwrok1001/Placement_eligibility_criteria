<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Prediction Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <h1 class="mb-4">Prediction</h1>
      <div class="card mb-3">
        <div class="card-body">
          <h3>Result: <span class="badge bg-success">{{ prediction }}</span></h3>
          {% if probability is not none %}
          <p>Probability (Placed): {{ '%.2f'|format(probability*100) }}%</p>
          {% endif %}
        </div>
      </div>

      <h4>Extracted features</h4>
      <table class="table table-sm table-striped">
        <thead><tr><th>Feature</th><th>Value</th><th>Matched text / snippet</th></tr></thead>
        <tbody>
        {% for k,v in features.items() %}
          <tr>
            <td>{{ k }}</td>
            <td>{{ v }}</td>
            <td>{{ highlights.get(k, '') }}</td>
          </tr>
        {% endfor %}
        </tbody>
      </table>

      <a href="/" class="btn btn-secondary">Back</a>
    </div>
  </body>
</html>
