<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Placement Prediction - Manual Input</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { max-width: 600px; margin: auto; }
        label { display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; }
        button { margin-top: 20px; padding: 10px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>
    <h1>Enter Student Details for Placement Prediction</h1>
    <form action="/manual_predict" method="POST">
        <label for="age">Age:</label>
        <input type="number" id="age" name="age" required>

        <label for="gender">Gender:</label>
        <select id="gender" name="gender" required>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>

        <label for="cgpa">CGPA:</label>
        <input type="number" step="0.01" id="cgpa" name="cgpa" required>

        <label for="branch">Branch:</label>
        <select id="branch" name="branch" required>
            <option value="CSE">CSE</option>
            <option value="IT">IT</option>
            <option value="ECE">ECE</option>
            <option value="EEE">EEE</option>
            <option value="CIVIL">CIVIL</option>
            <option value="MECHANICAL">MECHANICAL</option>
            <option value="OTHER">OTHER</option>
        </select>

        <label for="college_tier">College Tier:</label>
        <select id="college_tier" name="college_tier" required>
            <option value="Tier 1">Tier 1</option>
            <option value="Tier 2">Tier 2</option>
            <option value="Tier 3">Tier 3</option>
        </select>

        <label for="internships_count">Internships Count:</label>
        <input type="number" id="internships_count" name="internships_count" required>

        <label for="projects_count">Projects Count:</label>
        <input type="number" id="projects_count" name="projects_count" required>

        <label for="certifications_count">Certifications Count:</label>
        <input type="number" id="certifications_count" name="certifications_count" required>

        <!-- <label for="coding_skill_score">Coding Skill Score (0-100):</label>
        <input type="number" min="0" max="100" id="coding_skill_score" name="coding_skill_score" required> -->

        <!-- <label for="aptitude_score">Aptitude Score:</label>
        <input type="number" id="aptitude_score" name="aptitude_score" required>

        <label for="communication_skill_score">Communication Skill Score:</label>
        <input type="number" id="communication_skill_score" name="communication_skill_score" required> -->

        <!-- <label for="logical_reasoning_score">Logical Reasoning Score:</label>
        <input type="number" id="logical_reasoning_score" name="logical_reasoning_score" required> -->

        <label for="hackathons_participated">Hackathons Participated:</label>
        <input type="number" id="hackathons_participated" name="hackathons_participated" required>

        <label for="github_repos">GitHub Repos (0 or 1):</label>
        <input type="number" min="0" max="1" id="github_repos" name="github_repos" required>

        <label for="linkedin_connections">LinkedIn Connections (0 or 1):</label>
        <input type="number" min="0" max="1" id="linkedin_connections" name="linkedin_connections" required>

        <label for="mock_interview_score">Mock Interview Score:</label>
        <input type="number" id="mock_interview_score" name="mock_interview_score" required>

        <label for="attendance_percentage">Attendance Percentage:</label>
        <input type="number" step="0.01" id="attendance_percentage" name="attendance_percentage" required>

        <label for="backlogs">Backlogs:</label>
        <input type="number" id="backlogs" name="backlogs" required>

        <label for="extracurricular_score">Extracurricular Score:</label>
        <input type="number" id="extracurricular_score" name="extracurricular_score" required>

        <label for="leadership_score">Leadership Score:</label>
        <input type="number" id="leadership_score" name="leadership_score" required>

        <label for="volunteer_experience">Volunteer Experience:</label>
        <select id="volunteer_experience" name="volunteer_experience" required>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>
<!-- 
        <label for="sleep_hours">Sleep Hours:</label>
        <input type="number" step="0.01" id="sleep_hours" name="sleep_hours" required>

        <label for="study_hours_per_day">Study Hours Per Day:</label>
        <input type="number" step="0.01" id="study_hours_per_day" name="study_hours_per_day" required> -->

        <button type="submit">Predict Placement Eligibility</button>
    </form>
</body>
</html>
