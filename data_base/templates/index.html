<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Resume Placement Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <h1 class="mb-4">Resume Placement Predictor</h1>
      <p>Choose an option:</p>
      <ul>
        <li><a href="/manual">Enter details manually</a></li>
        <li>Or upload a PDF resume below:</li>
      </ul>
      <form method="post" action="/predict" enctype="multipart/form-data">
        <div class="mb-3">
          <label for="resume" class="form-label">Upload PDF resume</label>
          <input class="form-control" type="file" id="resume" name="resume" accept="application/pdf" required>
        </div>
        <button type="submit" class="btn btn-primary  action="{{ url_for('predict') }}" ">Predict</button>
      </form>
      <hr>
      <p class="text-muted">This demo extracts simple features from text heuristically — results may vary.</p>
    </div>
  </body>
</html>
